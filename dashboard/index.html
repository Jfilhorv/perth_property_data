<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perth Property Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header>
      <h1>Perth Property Dashboard</h1>
      <p>Visao geral dos imoveis vendidos na base local</p>
    </header>

    <main>
      <section class="kpi-grid" id="kpis"></section>

      <section class="panel">
        <h2>Filtro rapido</h2>
        <div class="filters">
          <label for="suburbSelect">Suburb</label>
          <select id="suburbSelect">
            <option value="">Todos</option>
          </select>
        </div>
      </section>

      <section class="panel">
        <h2>Evolucao anual de preco mediano</h2>
        <div class="filters">
          <label for="chartTypeSelect">Tipo de grafico</label>
          <select id="chartTypeSelect">
            <option value="line">Line</option>
            <option value="bar">Bar</option>
          </select>
        </div>
        <canvas id="yearlyChart" height="90"></canvas>
      </section>

      <section class="panel">
        <h2>Mapa de imoveis e preco medio por suburb</h2>
        <div id="map"></div>
      </section>

      <section class="panel">
        <h2>Top suburbs por volume</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Suburb</th>
                <th>Vendas</th>
                <th>Preco mediano</th>
                <th>Dist. media CBD (m)</th>
              </tr>
            </thead>
            <tbody id="suburbTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
