<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perth Property Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header>
      <h1>Perth Property Dashboard</h1>
      <p>Overview of sold properties from the local dataset</p>
    </header>

    <main>
      <section class="kpi-grid" id="kpis"></section>
      <p class="kpi-footnote" id="kpiFootnote"></p>

      <section class="panel">
        <h2>Top Menu</h2>
        <div class="filters">
          <label for="suburbSelect">Suburb</label>
          <select id="suburbSelect">
            <option value="">All</option>
          </select>
          <label for="chartTypeSelect">Chart</label>
          <select id="chartTypeSelect">
            <option value="line">Line</option>
            <option value="bar">Bar</option>
          </select>
          <label for="mapViewSelect">Map</label>
          <select id="mapViewSelect">
            <option value="both">Points + Average Price</option>
            <option value="listings">Points only (lat/lon)</option>
            <option value="suburb">Average price by suburb only</option>
          </select>
        </div>
      </section>

      <section class="viz-grid">
        <section class="panel">
          <h2>Yearly Median Price Trend</h2>
          <canvas id="yearlyChart" height="140"></canvas>
        </section>

        <section class="panel">
          <h2>Property Map and Average Price by Suburb</h2>
          <div id="map"></div>
        </section>
      </section>

      <section class="panel">
        <h2>Top Suburbs by Sales Volume</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Suburb</th>
                <th>Sales</th>
                <th>Median Price</th>
                <th>Avg. Distance to CBD (m)</th>
              </tr>
            </thead>
            <tbody id="suburbTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
