<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perth Property Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header>
      <h1>Perth Property Dashboard</h1>
      <p>Overview of sold properties from the local dataset</p>
    </header>

    <main>
      <section class="kpi-grid" id="kpis"></section>

      <section class="panel">
        <div class="filters">
          <label for="suburbSelect">Suburb</label>
          <select id="suburbSelect">
            <option value="">All</option>
          </select>
          <label for="bedroomSelect">Beds</label>
          <select id="bedroomSelect">
            <option value="">Any</option>
          </select>
          <label for="bathroomSelect">Baths</label>
          <select id="bathroomSelect">
            <option value="">Any</option>
          </select>
          <div class="range-filter">
            <label for="minPriceRange">Price</label>
            <div class="dual-range" id="priceDualRange">
              <input id="minPriceRange" type="range" min="0" max="1000000" step="10000" />
              <input id="maxPriceRange" type="range" min="0" max="1000000" step="10000" />
            </div>
            <span id="priceRangeValue">Any</span>
          </div>
          <button type="button" id="clearFiltersBtn" class="clear-filters-btn">Clear filters</button>
        </div>
      </section>

      <section class="viz-grid">
        <section class="panel">
          <div class="chart-panel-head">
            <h2>Yearly Median Price Trend</h2>
            <div class="chart-type-segment" role="group" aria-label="Chart type">
              <select id="chartTypeSelect" class="chart-type-select-hidden" tabindex="-1" aria-hidden="true">
                <option value="line" selected>Line</option>
                <option value="bar">Bar</option>
              </select>
              <button type="button" class="chart-type-segment__btn" data-chart-type="bar" aria-pressed="false">
                Bar
              </button>
              <button type="button" class="chart-type-segment__btn chart-type-segment__btn--active" data-chart-type="line" aria-pressed="true">
                Line
              </button>
            </div>
          </div>
          <div class="chart-wrap chart-wrap--clickable">
            <canvas id="yearlyChart"></canvas>
          </div>
        </section>

        <section class="panel">
          <div class="map-panel-head">
            <h2>Property Map and Average Price by Suburb</h2>
            <div class="map-layer-toggles" role="group" aria-label="Map layers">
              <label class="map-layer-tick" title="Average price by suburb">
                <input type="checkbox" id="mapLayerSuburbs" checked />
                <span>Suburbs</span>
              </label>
              <label class="map-layer-tick" title="Property sale locations">
                <input type="checkbox" id="mapLayerProperties" />
                <span>Properties</span>
              </label>
              <label class="map-layer-tick" title="Estimated school locations">
                <input type="checkbox" id="mapLayerSchools" />
                <span>School</span>
              </label>
              <label class="map-layer-tick" title="PTA stops and routes (Perth metro, simplified paths)">
                <input type="checkbox" id="mapLayerPublicTransport" />
                <span>Public Transport</span>
              </label>
            </div>
          </div>
          <div class="map-shell">
            <div id="map"></div>
          </div>
        </section>
      </section>

      <section class="panel">
        <div class="section-toolbar">
          <h2>Suburbs by Sales Volume</h2>
        </div>
        <div class="table-wrap" id="suburbTableWrap">
          <table>
            <thead>
              <tr>
                <th class="sortable" data-sort-key="Suburb" data-label="Suburb">Suburb</th>
                <th class="sortable" data-sort-key="count" data-label="Sales">Sales</th>
                <th class="sortable" data-sort-key="median_price" data-label="Median Price">Median Price</th>
                <th class="sortable" data-sort-key="variation_pct" data-label="Variation">Variation</th>
                <th class="sortable" data-sort-key="median_price_m2" data-label="Median Price M2">Median Price M2</th>
                <th class="sortable" data-sort-key="highest_price" data-label="Highest Price">Highest Price</th>
                <th class="sortable" data-sort-key="lowest_price" data-label="Lowest Price">Lowest Price</th>
                <th class="sortable" data-sort-key="avg_distance_to_cbd" data-label="Avg. Distance to CBD">Avg. Distance to CBD</th>
              </tr>
            </thead>
            <tbody id="suburbTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <p class="kpi-footnote" id="kpiFootnote"></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-box-and-violin-plot@4.0.0/build/index.umd.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js?v=20260328-chart-segment-toggle"></script>
  </body>
</html>
